<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>КТ - Контрольный тест</title>
<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 800px;
    margin: 20px auto;
    padding: 0 15px 90px 15px;
    line-height: 1.5;
    color: #222;
  }
  h1 { font-size: 22px; }
  h2.sectionTitle {
    font-size: 19px;
    margin-top: 30px;
    border-top: 2px solid #ddd;
    padding-top: 20px;
  }
  .question {
    border: 1px solid #ccc;
    border-radius: 6px;
    padding: 12px 15px;
    margin-bottom: 14px;
  }
  .question.unverified {
    border-color: #e0c000;
    background: #fffdf3;
  }
  .qtext { font-weight: bold; margin-bottom: 8px; }
  .options label {
    display: block;
    padding: 4px 6px;
    cursor: pointer;
    border-radius: 4px;
  }
  .options label:hover { background: #f0f0f0; }
  .correct { background: #d4f7d4; }
  .incorrect { background: #fbd4d4; }
  .answerNote {
    margin-top: 6px;
    font-size: 14px;
  }
  .rule {
    margin-top: 8px;
    font-size: 13px;
    background: #fffbe0;
    border-left: 3px solid #e0c000;
    padding: 6px 10px;
    border-radius: 3px;
  }
  .unverifiedNote {
    margin-top: 6px;
    font-size: 13px;
    color: #8a6d00;
  }
  #score {
    font-size: 18px;
    font-weight: bold;
    margin: 15px 0;
    padding: 10px;
    border-radius: 6px;
    background: #eef;
  }
  #fixedBtnWrap {
    position: fixed;
    left: 20px;
    bottom: 20px;
    z-index: 100;
  }
  #actionBtn {
    padding: 12px 22px;
    font-size: 16px;
    cursor: pointer;
    border: none;
    border-radius: 8px;
    background: #1a5fb4;
    color: white;
    box-shadow: 0 3px 10px rgba(0,0,0,0.3);
  }
  #actionBtn:hover { background: #14488e; }
  #actionBtn:disabled {
    background: #999;
    cursor: default;
  }
</style>
</head>
<body>

<h1>КТ — Контрольный тест (все 50 вопросов)</h1>
<p>Ответь на все вопросы и нажми "Проверить" (кнопка внизу слева), чтобы увидеть результат, разбор ошибок и мини-правила грамматики.</p>

<div id="quiz"></div>
<div id="score" style="display:none;"></div>

<div id="mistakesWork" style="display:none;">
  <h2 class="sectionTitle">Работа над ошибками</h2>
  <p>Заново ответь на вопросы, где была допущена ошибка. Под каждым — краткое правило.</p>
  <div id="mistakesQuiz"></div>
</div>

<div id="finalMessage" style="display:none;"></div>

<div id="fixedBtnWrap">
  <button id="actionBtn">Проверить</button>
</div>

let stage = 'main';
const quizDiv = document.getElementById('quiz');

function renderQuestions(container, list, prefix) {
  container.innerHTML = '';
  list.forEach((q, i) => {
    const qDiv = document.createElement('div');
    qDiv.className = 'question' + (q.correct === null ? ' unverified' : '');
    qDiv.id = prefix + i;
    let optionsHtml = '';
    for (const key in q.options) {
      optionsHtml += `<label><input type="radio" name="${prefix}${i}" value="${key}"> ${key}) ${q.options[key]}</label>`;
    }
    qDiv.innerHTML = `
      <div class="qtext">${q.num}. ${q.text}</div>
      <div class="options">${optionsHtml}</div>
      <div class="answerNote"></div>
    `;
    container.appendChild(qDiv);
  });
}

renderQuestions(quizDiv, questions, 'q');

function gradeQuestions(list, prefix, container, showRule) {
  let correctCount = 0;
  let gradedTotal = 0;
  const mistakes = [];
  list.forEach((q, i) => {
    const qDiv = document.getElementById(prefix + i);
    const selected = qDiv.querySelector(`input[name="${prefix}${i}"]:checked`);
    const note = qDiv.querySelector('.answerNote');
    qDiv.classList.remove('correct', 'incorrect');

    if (q.correct === null) {
      note.innerHTML = selected
        ? `Твой ответ: ${selected.value}) ${q.options[selected.value]}. <span class="unverifiedNote">\u26A0\uFE0F ${q.note}</span>`
        : `<span class="unverifiedNote">\u26A0\uFE0F ${q.note}</span>`;
      return;
    }

    gradedTotal++;
    if (!selected) {
      note.innerHTML = 'Не отвечено. Правильный ответ: ' + q.correct + ') ' + q.options[q.correct];
      qDiv.classList.add('incorrect');
      mistakes.push(q);
    } else if (selected.value === q.correct) {
      correctCount++;
      qDiv.classList.add('correct');
      note.textContent = 'Верно!';
    } else {
      qDiv.classList.add('incorrect');
      note.innerHTML = `Неверно. Ваш ответ: ${selected.value}) ${q.options[selected.value]}. Правильный ответ: ${q.correct}) ${q.options[q.correct]}`;
      mistakes.push(q);
    }
    if (showRule) {
      const ruleDiv = document.createElement('div');
      ruleDiv.className = 'rule';
      ruleDiv.textContent = '\u{1F4A1} ' + q.rule;
      note.appendChild(ruleDiv);
    }
  });
  return { correctCount, gradedTotal, mistakes };
}

document.getElementById('actionBtn').addEventListener('click', () => {
  if (stage === 'main') {
    const result = gradeQuestions(questions, 'q', quizDiv, false);
    const scoreDiv = document.getElementById('score');
    scoreDiv.style.display = 'block';
    scoreDiv.textContent = `Результат: ${result.correctCount} из ${result.gradedTotal} (4 вопроса не оценивались — нет исходного текста)`;

    if (result.mistakes.length > 0) {
      const mistakesWork = document.getElementById('mistakesWork');
      mistakesWork.style.display = 'block';
      renderQuestions(document.getElementById('mistakesQuiz'), result.mistakes, 'm');
      window.currentMistakes = result.mistakes;
      document.getElementById('actionBtn').textContent = 'Проверить исправления';
      stage = 'mistakes';
    } else {
      document.getElementById('finalMessage').style.display = 'block';
      document.getElementById('finalMessage').innerHTML = '<h2 class="sectionTitle">Отлично! Ошибок нет.</h2>';
      document.getElementById('actionBtn').textContent = 'Тест завершён';
      document.getElementById('actionBtn').disabled = true;
      stage = 'done';
    }
    window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'});
  } else if (stage === 'mistakes') {
    const mistakesQuizDiv = document.getElementById('mistakesQuiz');
    const result = gradeQuestions(window.currentMistakes, 'm', mistakesQuizDiv, true);
    const finalMsg = document.getElementById('finalMessage');
    finalMsg.style.display = 'block';
    finalMsg.innerHTML = `<h2 class="sectionTitle">Работа над ошибками завершена: ${result.correctCount} из ${result.gradedTotal} правильно</h2>`;
    document.getElementById('actionBtn').textContent = 'Тест завершён';
    document.getElementById('actionBtn').disabled = true;
    stage = 'done';
    window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'});
  }
});
</script>

</body>
</html>
